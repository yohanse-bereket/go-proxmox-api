version: "3.9"

services:

  db:
    image: postgres:15
    container_name: proxmox-db
    env_file:
      - .env
    ports:
      - "5431:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: proxmox-api
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8081:8080"
    volumes:
      - ./workspace:/workspace
      - ./terraform:/terraform

volumes:
  db_data: